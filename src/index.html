<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paratrooper</title>
<style>
  @media (orientation: landscape) and (hover: none) and (pointer: coarse) {
    body::after {
      content: 'Please rotate to portrait mode';
      position: fixed; inset: 0; z-index: 9999;
      background: #000; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font: bold 20px monospace; text-align: center;
    }
    canvas, #touch-controls { display: none !important; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  body { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; }
  canvas { display: block; }
  #touch-controls {
    display: none; position: relative; width: 100%;
    height: 120px; flex-shrink: 0;
    pointer-events: none;
  }
  .touch-btn {
    position: absolute; pointer-events: auto;
    border: 2px solid rgba(255,255,255,0.3); border-radius: 16px;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
    font: bold 22px monospace; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .touch-btn:active, .touch-btn.pressed {
    background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.8);
  }
  #btn-left { left: 15px; bottom: 20px; width: 80px; height: 80px; }
  #btn-right { left: 110px; bottom: 20px; width: 80px; height: 80px; }
  #btn-fire { right: 15px; bottom: 10px; width: 100px; height: 100px; border-radius: 50%; font-size: 16px; }
  @media (max-width: 768px), (hover: none) and (pointer: coarse) {
    #touch-controls { display: block; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touch-controls">
  <div id="btn-left" class="touch-btn">&larr;</div>
  <div id="btn-right" class="touch-btn">&rarr;</div>
  <div id="btn-fire" class="touch-btn">FIRE</div>
</div>
<script src="main.js"></script>
</body>
</html>
